name: SkyMind Daily Pipeline

on:
  schedule:
    - cron: '30 20 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Set env variables
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_KEY=${{ secrets.SUPABASE_SERVICE_KEY }}" >> $GITHUB_ENV
          echo "AMADEUS_API_KEY=${{ secrets.AMADEUS_API_KEY }}" >> $GITHUB_ENV
          echo "AMADEUS_SECRET=${{ secrets.AMADEUS_API_SECRET }}" >> $GITHUB_ENV

      - name: Run pipeline
        env:
          PYTHONPATH: ${{ github.workspace }}/backend
        run: python backend/run_pipeline.py